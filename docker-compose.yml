version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    container_name: wellness-postgres
    restart: always
    environment:
      POSTGRES_DB: wellness_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: wellness-backend
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: wellness_db
    ports:
      - "3000:3000"

  admin:
    build: ./admin-portal
    container_name: wellness-admin
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
